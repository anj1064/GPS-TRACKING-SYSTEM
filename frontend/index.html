<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GeoTrack - Advanced Tracking</title>
    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="styles.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Lucide Icons (lightweight and modern) -->
    <script src="https://unpkg.com/lucide@latest"></script>
</head>

<body>
    <div class="app-container">
        <!-- Floating Sidebar -->
        <aside class="sidebar glass-panel">
            <div class="brand">
                <div class="logo-container">
                    <i data-lucide="satellite" class="logo-icon"></i>
                </div>
                <div>
                    <h2>GeoTrack </h2>
                    <p class="subtitle">Field Intelligence</p>
                </div>
            </div>

            <div class="nav-wrapper">
                <nav class="nav-menu">
                    <button class="nav-btn active" id="btn-live">
                        <i data-lucide="activity"></i> Live Tracking
                    </button>
                    <button class="nav-btn" id="btn-reports">
                        <i data-lucide="map"></i> Travel Reports
                    </button>
                </nav>
                <div class="active-nav-indicator"></div>
            </div>

            <!-- Employee List View -->
            <div id="employee-list-section" class="panel-section active">
                <div class="section-header">
                    <h3>Active Operatives</h3>
                    <div class="badge pulse-badge">Live</div>
                </div>
                <div class="employee-list" id="employee-list">
                    <div class="loading-state">
                        <i data-lucide="loader-2" class="spin"></i> Syncing Data...
                    </div>
                </div>
            </div>

            <!-- Report Generator View -->
            <div id="report-section" class="panel-section">
                <div class="section-header">
                    <h3>Analytics & Routes</h3>
                </div>
                <div class="glass-form">
                    <div class="form-group">
                        <label for="report-employee"><i data-lucide="user"></i> Operative</label>
                        <select id="report-employee" class="glass-input">
                            <!-- Options injected -->
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="report-date"><i data-lucide="calendar"></i> Date</label>
                        <input type="date" id="report-date" class="glass-input">
                    </div>
                    <button class="btn-glow" id="btn-generate-report">
                        <i data-lucide="route"></i> Generate Route Map
                    </button>
                </div>
                <div id="report-results" class="report-results">
                    <!-- Report stats -->
                </div>
            </div>

            <div class="sidebar-footer">
                <div class="system-status">
                    <div class="status-dot green pulse"></div>
                    <span>System Optimal</span>
                </div>
            </div>
        </aside>

        <!-- Main Content Area -->
        <main class="main-content">
            <!-- Map Container -->
            <div id="map"></div>

            <!-- Map Overlay UI: Top Right -->
            <div class="map-overlay top-right glass-panel">
                <div class="stat-item">
                    <div class="stat-icon"><i data-lucide="users"></i></div>
                    <div class="stat-info">
                        <span class="stat-label">Active Field Force</span>
                        <span class="stat-value" id="stat-active">0</span>
                    </div>
                </div>
                <div class="stat-divider"></div>
                <div class="stat-item">
                    <div class="stat-icon"><i data-lucide="wifi"></i></div>
                    <div class="stat-info">
                        <span class="stat-label">Last Ping</span>
                        <span class="stat-value highlight" id="stat-ping">Just now</span>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- Leaflet JS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="app.js"></script>
    <!-- Initialize Lucide Icons -->
    <script>lucide.createIcons();</script>
</body>

</html>
